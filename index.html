<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DapurDuit — Catatan Keuangan Keluarga</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FBF8F3; --surface: #FFFFFF; --surface2: #F4F0E8; --border: #E8E2D6;
    --text: #1C1A15; --text2: #6B6558; --text3: #A09A8E;
    --green: #2D6A4F; --green-light: #E8F5EE; --green-mid: #52B788;
    --red: #C1440E; --red-light: #FDF0EB;
    --amber: #B5651D; --amber-light: #FEF6EC;
    --accent: #D4A853; --accent-light: #FDF5E6;
    --radius: 16px; --radius-sm: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FBF8F3 0%, #F4F0E8 100%); }
  .auth-card { background: var(--surface); border-radius: var(--radius); padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 1px solid var(--border); }
  .auth-logo { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 8px; text-align: center; }
  .auth-subtitle { color: var(--text2); text-align: center; margin-bottom: 32px; font-size: 13px; }
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; letter-spacing: 0.03em; }
  .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; }
  .btn-email { width: 100%; padding: 12px 16px; border: none; border-radius: var(--radius-sm); background: var(--text); color: white; cursor: pointer; font-weight: 500; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 0; position: fixed; height: 100vh; }
  .logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .logo-name { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .nav { padding: 16px 12px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); margin-bottom: 2px; }
  .nav-item.active { background: var(--text); color: white; }
  .main { margin-left: 240px; flex: 1; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .content { padding: 28px 32px; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
  .summary-amount { font-family: 'DM Serif Display', serif; font-size: 24px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .panel-header { padding: 18px 22px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .panel-body { padding: 20px 22px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(28,26,21,0.45); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 440px; padding: 28px; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 9px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); cursor: pointer; background: transparent; }
  .active-expense { border-color: var(--red); background: var(--red-light); color: var(--red); }
  .active-income { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .form-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-submit { flex: 1; padding: 11px; background: var(--text); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white; padding: 12px 20px; border-radius: var(--radius-sm); opacity: 0; transition: 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">DapurDuit</div>
    <div class="auth-subtitle">Masukkan password (888888)</div>
    <input class="form-input" id="passwordInput" type="password" placeholder="Password...">
    <button class="btn-email" style="margin-top:16px" onclick="handleSignIn()">Masuk</button>
  </div>
</div>

<div id="appScreen" class="app" style="display:none;">
  <aside class="sidebar">
    <div class="logo"><div class="logo-name">DapurDuit</div></div>
    <nav class="nav">
      <div class="nav-item active" onclick="setPage('dashboard')">Ringkasan</div>
      <div class="nav-item" onclick="setPage('transaksi')">Transaksi</div>
    </nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <div id="pageTitle" style="font-weight:600">Ringkasan</div>
      <button class="btn-submit" style="width:auto" onclick="openModal()">Tambah Transaksi</button>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="type-toggle">
      <button class="type-btn active-expense" id="btnPengeluaran" onclick="setType('expense')">Pengeluaran</button>
      <button class="type-btn" id="btnPemasukan" onclick="setType('income')">Pemasukan</button>
    </div>
    <input class="form-input" id="txName" placeholder="Keterangan..." style="margin-bottom:10px">
    <input class="form-input" id="txAmount" type="number" placeholder="Jumlah Rp..." style="margin-bottom:10px">
    <input class="form-input" id="txDate" type="date" style="margin-bottom:10px">
    <div class="form-actions">
      <button class="btn-submit" onclick="saveTransaction()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDSGKeiZKKS0hO3ASSGCnGSjhCmd4mEta4",
  authDomain: "finance-db-53a1f.firebaseapp.com",
  projectId: "finance-db-53a1f",
  storageBucket: "finance-db-53a1f.firebasestorage.app",
  messagingSenderId: "419379429557",
  appId: "1:419379429557:web:4184e645313169845e3efc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let txType = 'expense';
let transactions = [];

auth.onAuthStateChanged((user) => {
  if (user) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    // Menggunakan real-time listener agar data langsung muncul
    db.collection('users').doc(user.uid).collection('transactions')
      .onSnapshot(snap => {
        transactions = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderPage();
      });
  }
});

function handleSignIn() {
  if (document.getElementById('passwordInput').value === '888888') {
    auth.signInAnonymously();
  } else { showToast('Password salah'); }
}

async function saveTransaction() {
  const name = document.getElementById('txName').value;
  const amount = Number(document.getElementById('txAmount').value);
  const date = document.getElementById('txDate').value;
  if (!name || !amount || !date) return showToast('Lengkapi data');
  
  await db.collection('users').doc(auth.currentUser.uid).collection('transactions').add({
    name, amount, date, type: txType, createdAt: new Date().toISOString()
  });
  document.getElementById('modalOverlay').classList.remove('open');
  showToast('Tersimpan!');
}

function setType(t) {
  txType = t;
  document.getElementById('btnPengeluaran').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
  document.getElementById('btnPemasukan').className = 'type-btn' + (t === 'income' ? ' active-income' : '');
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function renderPage() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  document.getElementById('pageContent').innerHTML = `
    <div class="summary-grid">
      <div class="summary-card"><div>Pemasukan</div><div class="summary-amount">Rp ${income.toLocaleString()}</div></div>
      <div class="summary-card"><div>Pengeluaran</div><div class="summary-amount">Rp ${expense.toLocaleString()}</div></div>
      <div class="summary-card"><div>Saldo</div><div class="summary-amount">Rp ${(income-expense).toLocaleString()}</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">Riwayat Transaksi</div>
      <div class="panel-body">
        ${transactions.map(t => `<div style="padding:10px 0; border-bottom:1px solid #eee">${t.name} - <b>Rp ${t.amount.toLocaleString()}</b></div>`).join('')}
      </div>
    </div>
  `;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
